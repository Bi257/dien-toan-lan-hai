<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Server Log</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      background: #0d1117;
      color: white;
    }

    h1 { color: #00ff66; }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #00ff66;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .panel {
      flex: 1;
      background: #161b22;
      padding: 12px;
      border-radius: 10px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .group {
      margin-bottom: 14px;
      padding: 10px;
      border-radius: 8px;
      max-height: 220px;
      overflow-y: auto;
    }

    .booking-group { background:#08253d; border-left:4px solid #00bfff;}
    .prepare-group { background:#3d3200; border-left:4px solid #ffe600;}
    .commit-group { background:#00331f; border-left:4px solid #00ff66;}
    .error-group { background:#3a0000; border-left:4px solid #ff4d4d;}
    .all-group { background:#1f2937; border-left:4px solid #8b949e;}

    .log {
      font-family: Consolas;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .booking-log { color:#66ccff; }
    .prepare-log { color:#ffe066; }
    .commit-log { color:#00ff88; }
    .error-log { color:#ff6b6b; }

    .empty { color:#aaa; font-style: italic; }
  </style>
</head>

<body>

<h1>🖥 Server Log Dashboard</h1>

<div class="top-bar">
  <button onclick="loadLog()">🔄 Reload</button>
  <div id="lastUpdate">Chưa cập nhật</div>
</div>

<div class="container">

  <!-- ALL SERVERS -->
  <div class="panel">
    <h2>🌐 ALL SERVERS</h2>

    <div class="group booking-group"><h3>Booking</h3><div id="booking"></div></div>
    <div class="group prepare-group"><h3>PREPARE</h3><div id="prepare"></div></div>
    <div class="group commit-group"><h3>COMMIT</h3><div id="commit"></div></div>
    <div class="group error-group"><h3>ERROR</h3><div id="error"></div></div>
    <div class="group all-group"><h3>ALL</h3><div id="all"></div></div>
  </div>

  <!-- MY SERVER -->
  <div class="panel">
    <h2 id="myServerTitle">🟢 MY SERVER</h2>

    <div class="group booking-group"><h3>Booking</h3><div id="my-booking"></div></div>
    <div class="group prepare-group"><h3>PREPARE</h3><div id="my-prepare"></div></div>
    <div class="group commit-group"><h3>COMMIT</h3><div id="my-commit"></div></div>
    <div class="group error-group"><h3>ERROR</h3><div id="my-error"></div></div>
    <div class="group all-group"><h3>ALL</h3><div id="my-all"></div></div>
  </div>

</div>

<script>

// ===== SERVER LIST =====
const servers = [
  { name: "Server 5", url: "https://dien-toan-lan-hai.onrender.com" },
  { name: "Booking Server + server 3", url: "https://hotel-booking-system-new.onrender.com" },
  { name: "Server 4", url: "https://dientoanck.onrender.com" },
  { name: "Server 1", url: "https://demo2-75m2.onrender.com" }
];

// ===== AUTO DETECT CURRENT SERVER =====
const CURRENT_URL = window.location.origin;

function getCurrentServerName() {
  const found = servers.find(s =>
    CURRENT_URL.includes(new URL(s.url).hostname)
  );
  return found ? found.name : "UNKNOWN";
}

const CURRENT_SERVER = getCurrentServerName();
document.getElementById("myServerTitle").innerText =
  "🟢 " + CURRENT_SERVER;


// ===== LOAD LOG =====
async function loadLog() {

  let booking=[], prepare=[], commit=[], error=[], all=[];
  let myBooking=[], myPrepare=[], myCommit=[], myError=[], myAll=[];

  await Promise.all(servers.map(async s => {
    try {
      let res = await fetch(s.url + "/api/log?t=" + Date.now());
      let data = await res.json();

      data.reverse().forEach(log => {

        let full = `[${s.name}] ${log}`;
        let up = full.toUpperCase();

        // ===== ALL =====
        all.unshift(`<div class="log">${full}</div>`);

        if(up.includes("BOOK")) booking.unshift(`<div class="log booking-log">${full}</div>`);
        if(up.includes("CAN_COMMIT") || up.includes("PRE_COMMIT"))
          prepare.unshift(`<div class="log prepare-log">${full}</div>`);
        if(up.includes("COMMIT"))
          commit.unshift(`<div class="log commit-log">${full}</div>`);
        if(up.includes("ERROR")||up.includes("FAIL")||up.includes("ABORT"))
          error.unshift(`<div class="log error-log">${full}</div>`);

        // ===== MY SERVER =====
        if(s.name === CURRENT_SERVER){

          myAll.unshift(`<div class="log">${full}</div>`);

          if(up.includes("BOOK"))
            myBooking.unshift(`<div class="log booking-log">${full}</div>`);

          if(up.includes("CAN_COMMIT") || up.includes("PRE_COMMIT"))
            myPrepare.unshift(`<div class="log prepare-log">${full}</div>`);

          if(up.includes("COMMIT"))
            myCommit.unshift(`<div class="log commit-log">${full}</div>`);

          if(up.includes("ERROR")||up.includes("FAIL")||up.includes("ABORT"))
            myError.unshift(`<div class="log error-log">${full}</div>`);
        }

      });

    } catch(e){
      let msg = `<div class="log error-log">❌ ${s.name} DOWN</div>`;
      error.unshift(msg);
      all.unshift(msg);
    }
  }));

  // ===== RENDER LEFT =====
  document.getElementById("booking").innerHTML = booking.join("") || "No log";
  document.getElementById("prepare").innerHTML = prepare.join("") || "No log";
  document.getElementById("commit").innerHTML = commit.join("") || "No log";
  document.getElementById("error").innerHTML = error.join("") || "No log";
  document.getElementById("all").innerHTML = all.join("") || "No log";

  // ===== RENDER RIGHT =====
  document.getElementById("my-booking").innerHTML = myBooking.join("") || "No log";
  document.getElementById("my-prepare").innerHTML = myPrepare.join("") || "No log";
  document.getElementById("my-commit").innerHTML = myCommit.join("") || "No log";
  document.getElementById("my-error").innerHTML = myError.join("") || "No log";
  document.getElementById("my-all").innerHTML = myAll.join("") || "No log";

  document.getElementById("lastUpdate").innerText =
    "Cập nhật: " + new Date().toLocaleTimeString("vi-VN");
}

// AUTO LOAD
loadLog();
setInterval(loadLog, 10000);

</script>

</body>
</html>
